<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuminaCam AI Ultra Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7/dist/blazeface.min.js"></script>

<style>

body{
margin:0;
background:#000;
color:#fff;
font-family:Poppins;
overflow:hidden;
}

video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

canvas{
position:absolute;
top:0;
left:0;
}

.top{
position:absolute;
top:10px;
width:100%;
display:flex;
justify-content:space-around;
z-index:10;
}

.bottom{
position:absolute;
bottom:0;
width:100%;
padding:20px;
background:linear-gradient(transparent,rgba(0,0,0,.8));
display:flex;
flex-direction:column;
align-items:center;
}

.controls{
display:flex;
align-items:center;
gap:30px;
margin-top:10px;
}

button{
border:2px solid white;
background:transparent;
color:white;
padding:8px 15px;
border-radius:25px;
transition:.2s;
}

button:active{
transform:scale(.85);
}

.shutter{
width:70px;
height:70px;
border-radius:50%;
border:4px solid white;
display:flex;
justify-content:center;
align-items:center;
}

.inner{
width:55px;
height:55px;
background:white;
border-radius:50%;
}

.record{
background:red;
}

.filters{
display:flex;
overflow:auto;
gap:10px;
width:100%;
padding:5px;
}

.filter{
min-width:60px;
font-size:11px;
text-align:center;
}

.thumb{
width:50px;
height:50px;
border-radius:8px;
border:2px solid white;
background-size:cover;
}

#gallery{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:50;
}

#gallery img,#gallery video{
max-width:95%;
max-height:80%;
}

.zoom{
position:absolute;
top:60px;
left:50%;
transform:translateX(-50%);
width:70%;
}

</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="overlay"></canvas>

<input type="range" min="1" max="3" step="0.1" value="1" class="zoom" id="zoom">

<div class="top">
<button onclick="switchCamera()">Switch</button>
<button onclick="toggleTimer()">Timer</button>
<button onclick="toggleRecord()">Video</button>
</div>

<div class="bottom">

<div class="filters" id="filters"></div>

<div class="controls">

<div class="thumb" id="thumb" onclick="openGallery()"></div>

<div class="shutter" onclick="capture()">
<div class="inner"></div>
</div>

<button onclick="deleteLast()">Delete</button>

</div>

</div>

<div id="gallery">
<button onclick="closeGallery()">Close</button>
<img id="gimg">
<video id="gvid" controls></video>
<button onclick="downloadFile()">Download</button>
</div>

<script>

const video=document.getElementById("video")
const overlay=document.getElementById("overlay")
const ctx=overlay.getContext("2d")

let model
let stream
let facing="environment"

let timer=0
let recorder
let recording=false
let chunks=[]

let media=[]
let currentMedia=null

const filters=[
{name:"Normal",val:"none"},
{name:"Noir",val:"grayscale(1) contrast(1.2)"},
{name:"Vintage",val:"sepia(.6)"},
{name:"Aqua",val:"hue-rotate(160deg)"},
{name:"Vivid",val:"saturate(2)"},
{name:"Warm",val:"sepia(.3) saturate(1.5)"},
{name:"Cool",val:"hue-rotate(200deg)"}
]

async function startCamera(){

if(stream)stream.getTracks().forEach(t=>t.stop())

stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:facing,width:{ideal:1280},height:{ideal:720}},
audio:true
})

video.srcObject=stream

video.onloadedmetadata=()=>{
video.play()
setupAI()
}

}

function switchCamera(){
facing=facing==="environment"?"user":"environment"
startCamera()
}

async function setupAI(){

model=await blazeface.load()

detect()

}

async function detect(){

if(video.videoWidth>0){

overlay.width=video.videoWidth
overlay.height=video.videoHeight

const preds=await model.estimateFaces(video,false)

ctx.clearRect(0,0,overlay.width,overlay.height)

preds.forEach(p=>{
const s=p.topLeft
const e=p.bottomRight
ctx.strokeStyle="#00f2ff"
ctx.lineWidth=3
ctx.strokeRect(s[0],s[1],e[0]-s[0],e[1]-s[1])
})

}

requestAnimationFrame(detect)

}

function capture(){

if(timer>0){

let c=timer

const t=setInterval(()=>{

c--

if(c<0){
clearInterval(t)
snap()
}

},1000)

}else snap()

}

function snap(){

const canvas=document.createElement("canvas")
canvas.width=video.videoWidth
canvas.height=video.videoHeight

const c=canvas.getContext("2d")
c.filter=getComputedStyle(video).filter
c.drawImage(video,0,0)

const img=canvas.toDataURL("image/jpeg")

media.push({type:"img",data:img})

saveMedia()

updateThumb()

}

function toggleRecord(){

if(!recording){

chunks=[]

recorder=new MediaRecorder(stream)

recorder.ondataavailable=e=>chunks.push(e.data)

recorder.onstop=saveVideo

recorder.start()

recording=true

}else{

recorder.stop()

recording=false

}

}

function saveVideo(){

const blob=new Blob(chunks,{type:"video/webm"})
const url=URL.createObjectURL(blob)

media.push({type:"vid",data:url})

saveMedia()

updateThumb()

}

function updateThumb(){

if(media.length===0)return

const last=media[media.length-1]

if(last.type==="img")
thumb.style.backgroundImage=`url(${last.data})`

else
thumb.style.backgroundImage="url(https://cdn-icons-png.flaticon.com/512/727/727245.png)"

}

function openGallery(){

if(media.length===0)return

currentMedia=media[media.length-1]

document.getElementById("gallery").style.display="flex"

if(currentMedia.type==="img"){
gimg.src=currentMedia.data
gimg.style.display="block"
gvid.style.display="none"
}else{
gvid.src=currentMedia.data
gvid.style.display="block"
gimg.style.display="none"
}

}

function closeGallery(){
gallery.style.display="none"
}

function downloadFile(){

const a=document.createElement("a")

a.href=currentMedia.data
a.download="Lumina_"+Date.now()

a.click()

}

function deleteLast(){

media.pop()

saveMedia()

updateThumb()

}

function saveMedia(){

localStorage.setItem("luminaMedia",JSON.stringify(media))

}

function loadMedia(){

const m=localStorage.getItem("luminaMedia")

if(m)media=JSON.parse(m)

updateThumb()

}

function toggleTimer(){

timer=timer===0?3:(timer===3?10:0)

alert("Timer "+(timer===0?"OFF":timer+"s"))

}

function loadFilters(){

filters.forEach(f=>{

const div=document.createElement("div")

div.className="filter"

div.innerHTML=`<div style="width:45px;height:45px;border-radius:50%;background:#444;filter:${f.val}"></div>${f.name}`

div.onclick=()=>video.style.filter=f.val

filtersBox.appendChild(div)

})

}

zoom.oninput=()=>video.style.transform="scale("+zoom.value+")"

window.onload=()=>{
loadFilters()
loadMedia()
startCamera()
}

</script>

</body>
</html>

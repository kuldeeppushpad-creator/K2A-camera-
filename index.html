<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LuminaCam AI | Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7/dist/blazeface.min.js"></script>

<style>

:root{
--glass: rgba(255,255,255,0.15);
--accent:#00f2ff;
--bg:#000;
}

body,html{
margin:0;
padding:0;
width:100%;
height:100%;
background:var(--bg);
font-family:'Poppins',sans-serif;
overflow:hidden;
color:white;
}

#app-container{
position:relative;
width:100%;
height:100%;
display:flex;
flex-direction:column;
}

video{
width:100%;
height:100%;
object-fit:cover;
position:absolute;
top:0;
left:0;
}

canvas#overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:2;
pointer-events:none;
}

.ui-overlay{
position:absolute;
z-index:10;
width:100%;
pointer-events:none;
}

.ui-overlay button,.ui-overlay div{
pointer-events:auto;
}

.top-bar{
top:0;
height:70px;
display:flex;
justify-content:space-around;
align-items:center;
background:linear-gradient(to bottom,rgba(0,0,0,0.5),transparent);
}

.bottom-bar{
bottom:0;
height:180px;
background:linear-gradient(to top,rgba(0,0,0,0.7),transparent);
display:flex;
flex-direction:column;
align-items:center;
padding-bottom:20px;
}

.shutter-btn{
width:75px;
height:75px;
border:4px solid white;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
}

.shutter-inner{
width:60px;
height:60px;
background:white;
border-radius:50%;
}

.icon-btn{
background:rgba(255,255,255,0.1);
border:1px solid rgba(255,255,255,0.2);
color:white;
width:45px;
height:45px;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
}

.filter-container{
display:flex;
overflow-x:auto;
width:100%;
padding:10px;
gap:15px;
}

.filter-box{
min-width:60px;
text-align:center;
font-size:10px;
}

.filter-preview{
width:45px;
height:45px;
border-radius:50%;
border:2px solid transparent;
margin-bottom:4px;
}

.filter-preview.active{
border-color:var(--accent);
}

#gallery-modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#000;
z-index:100;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
}

#gallery-img{
max-width:95%;
max-height:80%;
border-radius:10px;
}

#status-msg{
position:absolute;
top:80px;
left:50%;
transform:translateX(-50%);
background:rgba(0,242,255,0.2);
padding:5px 15px;
border-radius:20px;
font-size:12px;
border:1px solid var(--accent);
display:none;
z-index:20;
}

.flash{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
z-index:1000;
display:none;
}

#settings{
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:20px;
display:none;
z-index:200;
}

</style>
</head>

<body>

<div class="flash" id="flash-effect"></div>

<div id="app-container">

<video id="video" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>

<div id="status-msg">AI Face Tracking</div>

<div class="ui-overlay top-bar">
<button class="icon-btn" onclick="toggleFlash()"><i class="fas fa-bolt"></i></button>
<button class="icon-btn" onclick="toggleTimer()"><i class="fas fa-clock"></i></button>
<button class="icon-btn" onclick="switchCamera()"><i class="fas fa-camera-rotate"></i></button>
</div>

<div class="ui-overlay bottom-bar">

<div class="filter-container" id="filters"></div>

<div style="display:flex;width:100%;justify-content:space-around;align-items:center;margin-top:10px;">

<div id="last-thumb" onclick="openGallery()" style="width:50px;height:50px;border-radius:8px;border:2px solid white;background-size:cover;"></div>

<div class="shutter-btn" onclick="handleCapture()">
<div class="shutter-inner"></div>
</div>

<button class="icon-btn" onclick="openSettings()"><i class="fas fa-cog"></i></button>

</div>

</div>
</div>

<div id="gallery-modal">

<button class="icon-btn" style="position:absolute;top:30px;right:20px;" onclick="closeGallery()">
<i class="fas fa-times"></i>
</button>

<img id="gallery-img">

<div style="margin-top:25px;display:flex;gap:30px;">

<button class="icon-btn" onclick="downloadImg()"><i class="fas fa-download"></i></button>
<button class="icon-btn" onclick="enhancePhoto()"><i class="fas fa-magic"></i></button>

</div>

</div>

<div id="settings">
<button onclick="toggleAI()">Toggle AI Detection</button>
<button onclick="video.style.filter='none'">Reset Filter</button>
<button onclick="closeSettings()">Close</button>
</div>

<script>

const video=document.getElementById('video')
const overlay=document.getElementById('overlay')
const ctx=overlay.getContext('2d')
const statusMsg=document.getElementById('status-msg')

let model,stream
let isFront=false
let lastPhoto=null
let captureTimer=0
let aiEnabled=true

const filters=[
{name:'None',val:'none'},
{name:'Noir',val:'grayscale(1) contrast(1.2)'},
{name:'Vintage',val:'sepia(.6)'},
{name:'Aqua',val:'hue-rotate(160deg)'},
{name:'Vivid',val:'saturate(2)'},
{name:'Bloom',val:'brightness(1.2)'}
]

async function initCamera(){

if(stream)stream.getTracks().forEach(t=>t.stop())

stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:isFront?"user":"environment",width:{ideal:1280},height:{ideal:720}}
})

video.srcObject=stream

video.onloadedmetadata=()=>{
video.play()
setupAI()
}

}

async function setupAI(){

if(!aiEnabled)return

statusMsg.style.display='block'
statusMsg.innerText='Loading AI'

model=await blazeface.load()

statusMsg.innerText='AI Ready'

setTimeout(()=>statusMsg.style.display='none',2000)

detect()

}

async function detect(){

if(!model||video.paused)return

if(video.videoWidth>0){

overlay.width=video.videoWidth
overlay.height=video.videoHeight

const preds=await model.estimateFaces(video,false)

ctx.clearRect(0,0,overlay.width,overlay.height)

preds.forEach(p=>{

ctx.strokeStyle="#00f2ff"
ctx.lineWidth=4

const s=p.topLeft
const e=p.bottomRight

ctx.strokeRect(s[0],s[1],e[0]-s[0],e[1]-s[1])

})

}

requestAnimationFrame(detect)

}

function handleCapture(){

if(captureTimer>0){

let count=captureTimer

statusMsg.style.display='block'

const timer=setInterval(()=>{

statusMsg.innerText=`Timer ${count}`

count--

if(count<0){

clearInterval(timer)

statusMsg.style.display='none'

capture()

}

},1000)

}else capture()

}

function capture(){

const flash=document.getElementById('flash-effect')
flash.style.display='block'

setTimeout(()=>flash.style.display='none',100)

const canvas=document.createElement('canvas')
canvas.width=video.videoWidth
canvas.height=video.videoHeight

const c=canvas.getContext('2d')

c.filter=getComputedStyle(video).filter
c.drawImage(video,0,0)

lastPhoto=canvas.toDataURL('image/jpeg')

document.getElementById('last-thumb').style.backgroundImage=`url(${lastPhoto})`

}

function openGallery(){

if(!lastPhoto)return

document.getElementById('gallery-img').src=lastPhoto
document.getElementById('gallery-modal').style.display='flex'

}

function closeGallery(){

document.getElementById('gallery-modal').style.display='none'

}

function downloadImg(){

const a=document.createElement('a')
a.download="Lumina_"+Date.now()+".jpg"
a.href=lastPhoto
a.click()

}

function enhancePhoto(){

const img=new Image()

img.onload=function(){

const canvas=document.createElement('canvas')
canvas.width=img.width
canvas.height=img.height

const c=canvas.getContext('2d')

c.filter="contrast(1.3) saturate(1.3) brightness(1.1)"

c.drawImage(img,0,0)

lastPhoto=canvas.toDataURL('image/jpeg')

document.getElementById('gallery-img').src=lastPhoto

}

img.src=lastPhoto

}

function toggleFlash(){

video.style.filter="brightness(1.5)"

setTimeout(()=>video.style.filter="none",200)

}

function toggleTimer(){

captureTimer=captureTimer===0?3:(captureTimer===3?10:0)

alert("Timer "+(captureTimer===0?"OFF":captureTimer+"s"))

}

function switchCamera(){

isFront=!isFront

initCamera()

}

function openSettings(){

document.getElementById('settings').style.display='block'

}

function closeSettings(){

document.getElementById('settings').style.display='none'

}

function toggleAI(){

aiEnabled=!aiEnabled

if(aiEnabled)setupAI()

}

function loadFilters(){

const container=document.getElementById('filters')

filters.forEach(f=>{

const div=document.createElement('div')

div.className='filter-box'

div.innerHTML=`
<div class="filter-preview" style="filter:${f.val};background:#444"></div>
<span>${f.name}</span>
`

div.onclick=()=>{

video.style.filter=f.val

document.querySelectorAll('.filter-preview').forEach(el=>el.classList.remove('active'))

div.querySelector('.filter-preview').classList.add('active')

}

container.appendChild(div)

})

}

window.onload=()=>{

loadFilters()

initCamera()

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LuminaCam AI Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.11.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7/dist/blazeface.min.js"></script>

<style>

body{
margin:0;
background:#000;
font-family:Poppins;
overflow:hidden;
color:white;
}

video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
}

canvas{
position:absolute;
top:0;
left:0;
}

.top-bar{
position:absolute;
top:10px;
width:100%;
display:flex;
justify-content:space-around;
z-index:10;
}

.bottom-bar{
position:absolute;
bottom:0;
width:100%;
padding:20px;
background:linear-gradient(transparent,rgba(0,0,0,.8));
display:flex;
flex-direction:column;
align-items:center;
}

button{
border:2px solid white;
background:transparent;
color:white;
padding:8px 15px;
border-radius:25px;
transition:.2s;
}

button:active{
transform:scale(.85);
}

.shutter{
width:70px;
height:70px;
border-radius:50%;
border:4px solid white;
display:flex;
align-items:center;
justify-content:center;
}

.inner{
width:55px;
height:55px;
background:white;
border-radius:50%;
}

.filters{
display:flex;
gap:10px;
overflow:auto;
width:100%;
}

.filter{
font-size:11px;
text-align:center;
min-width:60px;
}

.thumb{
width:50px;
height:50px;
border-radius:8px;
border:2px solid white;
background-size:cover;
}

#gallery{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:20;
}

#gallery img{
max-width:95%;
max-height:80%;
}

#status{
position:absolute;
top:80px;
left:50%;
transform:translateX(-50%);
background:#00f2ff33;
padding:5px 15px;
border-radius:20px;
border:1px solid #00f2ff;
display:none;
}

#settings{
position:fixed;
bottom:0;
width:100%;
background:#111;
padding:20px;
display:none;
z-index:30;
}

</style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="overlay"></canvas>

<div id="status"></div>

<div class="top-bar">
<button onclick="toggleFlash()">Flash</button>
<button onclick="toggleTimer()">Timer</button>
<button onclick="switchCamera()">Switch</button>
<button onclick="openSettings()">Settings</button>
</div>

<div class="bottom-bar">

<div class="filters" id="filters"></div>

<div style="display:flex;gap:25px;margin-top:10px">

<div class="thumb" id="thumb" onclick="openGallery()"></div>

<div class="shutter" onclick="capture()">
<div class="inner"></div>
</div>

</div>

</div>

<div id="gallery">

<button onclick="closeGallery()">Close</button>

<img id="gallery-img">

<div style="margin-top:20px;display:flex;gap:20px">

<button onclick="downloadImg()">Download</button>

<button onclick="enhancePhoto()">Enhance</button>

</div>

</div>

<div id="settings">

<button onclick="toggleAI()">Toggle AI Face Detection</button>
<button onclick="video.style.filter='none'">Reset Filters</button>
<button onclick="clearGallery()">Clear Gallery</button>
<button onclick="closeSettings()">Close</button>

</div>

<script>

const video=document.getElementById("video")
const overlay=document.getElementById("overlay")
const ctx=overlay.getContext("2d")

const status=document.getElementById("status")

let stream
let facing="environment"
let model

let lastPhoto=null
let timer=0
let flash=false

const filters=[
{name:"Normal",val:"none"},
{name:"Noir",val:"grayscale(1)"},
{name:"Vintage",val:"sepia(.6)"},
{name:"Aqua",val:"hue-rotate(160deg)"},
{name:"Vivid",val:"saturate(2)"}
]

function showStatus(msg){

status.innerText=msg
status.style.display="block"

setTimeout(()=>{
status.style.display="none"
},1500)

}

async function startCamera(){

if(stream)stream.getTracks().forEach(t=>t.stop())

stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:facing,width:{ideal:1280},height:{ideal:720}}
})

video.srcObject=stream

video.onloadedmetadata=()=>{
video.play()
setupAI()
}

}

function switchCamera(){

facing=facing==="environment"?"user":"environment"
startCamera()

}

async function setupAI(){

model=await blazeface.load()

detect()

}

async function detect(){

if(!model)return

if(video.videoWidth>0){

overlay.width=video.videoWidth
overlay.height=video.videoHeight

const preds=await model.estimateFaces(video,false)

ctx.clearRect(0,0,overlay.width,overlay.height)

preds.forEach(p=>{
const s=p.topLeft
const e=p.bottomRight

ctx.strokeStyle="#00f2ff"
ctx.lineWidth=3
ctx.strokeRect(s[0],s[1],e[0]-s[0],e[1]-s[1])

})

}

requestAnimationFrame(detect)

}

function capture(){

if(timer>0){

let c=timer

const t=setInterval(()=>{

c--

if(c<0){
clearInterval(t)
snap()
}

},1000)

}else snap()

}

function snap(){

const canvas=document.createElement("canvas")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

const c=canvas.getContext("2d")

c.filter=getComputedStyle(video).filter

c.drawImage(video,0,0)

lastPhoto=canvas.toDataURL("image/jpeg")

thumb.style.backgroundImage=`url(${lastPhoto})`

}

function openGallery(){

if(!lastPhoto)return

document.getElementById("gallery").style.display="flex"
document.getElementById("gallery-img").src=lastPhoto

}

function closeGallery(){

gallery.style.display="none"

}

function downloadImg(){

const a=document.createElement("a")

a.href=lastPhoto
a.download="Lumina_"+Date.now()+".jpg"

a.click()

}

function enhancePhoto(){

if(!lastPhoto)return

const img=new Image()

img.onload=function(){

const canvas=document.createElement("canvas")
canvas.width=img.width
canvas.height=img.height

const c=canvas.getContext("2d")

c.filter="contrast(1.3) saturate(1.3) brightness(1.1)"

c.drawImage(img,0,0)

lastPhoto=canvas.toDataURL("image/jpeg")

document.getElementById("gallery-img").src=lastPhoto

showStatus("AI Enhancement Done")

}

img.src=lastPhoto

}

function toggleFlash(){

flash=!flash

if(flash){
video.style.filter="brightness(1.5)"
showStatus("Flash ON")
}else{
video.style.filter="none"
showStatus("Flash OFF")
}

}

function toggleTimer(){

timer=timer===0?3:(timer===3?10:0)

showStatus(timer===0?"Timer OFF":"Timer "+timer+"s")

}

function openSettings(){

settings.style.display="block"

}

function closeSettings(){

settings.style.display="none"

}

function toggleAI(){

if(model){

model=null
showStatus("AI Disabled")

}else{

setupAI()
showStatus("AI Enabled")

}

}

function clearGallery(){

lastPhoto=null
thumb.style.backgroundImage=""
showStatus("Gallery Cleared")

}

function loadFilters(){

filters.forEach(f=>{

const div=document.createElement("div")

div.className="filter"

div.innerHTML=`<div style="width:45px;height:45px;border-radius:50%;background:#444;filter:${f.val}"></div>${f.name}`

div.onclick=()=>video.style.filter=f.val

filters.appendChild(div)

})

}

window.onload=()=>{

loadFilters()
startCamera()

}

</script>

</body>
</html>
